default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

pg_default: &pg_default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  username: rileyalexis
  password: pass

development:
  <<: *pg_default
  database: libre_stack_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *pg_default
  database: libre_stack_test

production:
  primary:
    <<: *pg_default
    database: libre_stack_production
  cache:
    <<: *pg_default
    database: libre_stack_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *pg_default
    database: libre_stack_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *pg_default
    database: libre_stack_production_cable
    migrations_paths: db/cable_migrate
